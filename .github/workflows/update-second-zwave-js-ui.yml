name: Update Second Z-Wave JS UI Add-on

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out my repo
        uses: actions/checkout@v4

      - name: Check latest upstream commit
        run: |
          git clone --depth 1 https://github.com/hassio-addons/addon-zwave-js-ui.git upstream-check

          UPSTREAM_SHA=$(git -C upstream-check rev-parse HEAD)
          UPSTREAM_SHORT_SHA=$(git -C upstream-check rev-parse --short HEAD)

          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> $GITHUB_ENV
          echo "UPSTREAM_SHORT_SHA=$UPSTREAM_SHORT_SHA" >> $GITHUB_ENV

          if [ -f .upstream-zwave-js-ui-commit ]; then
            CURRENT_SHA=$(cat .upstream-zwave-js-ui-commit)
          else
            CURRENT_SHA=""
          fi

          echo "Current stored upstream SHA: $CURRENT_SHA"
          echo "Latest upstream SHA: $UPSTREAM_SHA"

          if [ "$CURRENT_SHA" = "$UPSTREAM_SHA" ]; then
            echo "No upstream update found."
            echo "SHOULD_UPDATE=false" >> $GITHUB_ENV
          else
            echo "Upstream update found."
            echo "SHOULD_UPDATE=true" >> $GITHUB_ENV
          fi

          rm -rf upstream-check

      - name: Stop if no upstream update
        if: env.SHOULD_UPDATE == 'false'
        run: |
          echo "Official Z-Wave JS UI add-on has not changed. No update needed."

      - name: Remove old add-on copy
        if: env.SHOULD_UPDATE == 'true'
        run: |
          rm -rf zwave-js-ui-second
          rm -rf upstream

      - name: Download latest official Z-Wave JS UI add-on
        if: env.SHOULD_UPDATE == 'true'
        run: |
          git clone --depth 1 https://github.com/hassio-addons/addon-zwave-js-ui.git upstream
          cp -R upstream/zwave-js-ui zwave-js-ui-second
          rm -rf upstream

      - name: Install Python YAML support
        if: env.SHOULD_UPDATE == 'true'
        run: |
          python3 -m pip install pyyaml

      - name: Patch add-on identity and ports
        if: env.SHOULD_UPDATE == 'true'
        run: |
          python3 scripts/patch_zwave_second.py

      - name: Store latest upstream commit
        if: env.SHOULD_UPDATE == 'true'
        run: |
          echo "$UPSTREAM_SHA" > .upstream-zwave-js-ui-commit

      - name: Commit changes if upstream changed
        if: env.SHOULD_UPDATE == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Update Z-Wave JS EU from upstream $UPSTREAM_SHORT_SHA"
          git push
