name: Update Z-Wave JS EU

on:
  workflow_dispatch:
  schedule:
    # Check every day at 03:00 UTC / 06:00 Bahrain time
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out my repository
        uses: actions/checkout@v4

      - name: Find latest official release
        shell: bash
        run: |
          UPSTREAM_TAG=$(
            curl -fsSL \
              https://api.github.com/repos/hassio-addons/app-zwave-js-ui/releases/latest \
              | jq -r '.tag_name'
          )

          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "Could not determine the latest official release."
            exit 1
          fi

          UPSTREAM_VERSION="${UPSTREAM_TAG#v}"

          echo "Latest official tag: $UPSTREAM_TAG"
          echo "Latest official version: $UPSTREAM_VERSION"

          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> "$GITHUB_ENV"
          echo "UPSTREAM_VERSION=$UPSTREAM_VERSION" >> "$GITHUB_ENV"

          if [ -f .upstream-zwave-js-ui-release ]; then
            CURRENT_TAG=$(cat .upstream-zwave-js-ui-release)
          else
            CURRENT_TAG=""
          fi

          echo "Currently mirrored tag: $CURRENT_TAG"

          if [ "$CURRENT_TAG" = "$UPSTREAM_TAG" ]; then
            echo "SHOULD_UPDATE=false" >> "$GITHUB_ENV"
            echo "No new official release."
          else
            echo "SHOULD_UPDATE=true" >> "$GITHUB_ENV"
            echo "New official release found."
          fi

      - name: Report no update
        if: env.SHOULD_UPDATE == 'false'
        run: |
          echo "Z-Wave JS EU is already based on $UPSTREAM_TAG."

      - name: Remove previous generated copy
        if: env.SHOULD_UPDATE == 'true'
        run: |
          rm -rf zwave-js-ui-second
          rm -rf upstream

      - name: Download exact official release
        if: env.SHOULD_UPDATE == 'true'
        run: |
          git clone \
            --depth 1 \
            --branch "$UPSTREAM_TAG" \
            https://github.com/hassio-addons/app-zwave-js-ui.git \
            upstream

          cp -R upstream/zwave-js-ui zwave-js-ui-second
          rm -rf upstream

      - name: Install YAML support
        if: env.SHOULD_UPDATE == 'true'
        run: |
          python3 -m pip install pyyaml

      - name: Apply EU customizations
        if: env.SHOULD_UPDATE == 'true'
        run: |
          python3 scripts/patch_zwave_second.py

      - name: Store mirrored release
        if: env.SHOULD_UPDATE == 'true'
        run: |
          echo "$UPSTREAM_TAG" > .upstream-zwave-js-ui-release

      - name: Remove old commit-tracking file
        if: env.SHOULD_UPDATE == 'true'
        run: |
          rm -f .upstream-zwave-js-ui-commit

      - name: Commit new release
        if: env.SHOULD_UPDATE == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No files changed."
          else
            git commit -m "Update Z-Wave JS EU to $UPSTREAM_TAG"
            git push
          fi
